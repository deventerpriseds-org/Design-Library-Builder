name: Deploy App v2 to Azure Static Web Apps

on:
  push:
    branches: [main, claude/figma-builder-app-copy-xeidub]
    paths:
      - 'v2/**'
      - '.github/workflows/deploy-app-v2.yml'
  workflow_dispatch:

env:
  SWA_NAME: design-library-builder-v2
  RESOURCE_GROUP: EnterpriseDS_ResourceGRP
  FUNCTION_APP_NAME: design-library-builder-api

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Resolve Microsoft client ID
        id: msid
        run: |
          MSID=$(az ad app list --display-name design-library-builder --query "[0].appId" -o tsv 2>/dev/null || true)
          if [ -z "$MSID" ] || [ "$MSID" = "null" ]; then
            MSID=$(az ad app list --display-name executive-engine-web --query "[0].appId" -o tsv 2>/dev/null || true)
          fi
          if [ "$MSID" = "null" ]; then MSID=""; fi
          echo "client_id=${MSID}" >> $GITHUB_OUTPUT

      - name: Ensure Static Web App v2 exists
        id: swa
        run: |
          EXISTS=$(az staticwebapp show \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            echo "Creating Static Web App: $SWA_NAME"
            az staticwebapp create \
              --name $SWA_NAME \
              --resource-group $RESOURCE_GROUP \
              --location eastus2 \
              --sku Free
          fi
          HOST=$(az staticwebapp show \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "defaultHostname" -o tsv 2>/dev/null || echo "")
          echo "hostname=$HOST" >> $GITHUB_OUTPUT

      - name: Resolve API URL
        id: api
        run: |
          HOST=$(az functionapp show \
            --name $FUNCTION_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "defaultHostName" -o tsv 2>/dev/null || echo "")
          if [ -n "$HOST" ]; then
            API_BASE="https://$HOST/api"
          else
            API_BASE="https://design-library-builder-api.azurewebsites.net/api"
          fi
          echo "base=$API_BASE" >> $GITHUB_OUTPUT

      - name: Provision ux_design PostgreSQL and run migrations
        id: pgdb
        env:
          PG_SERVER: ux-design-pg
          PG_ADMIN_USER: Admin_eds
          PG_DB: ux_design
          PG_PASSWORD: ${{ secrets.Azure_admin_pw }}
        run: |
          # Create Flexible Server if absent
          EXISTS=$(az postgres flexible-server show \
            --name $PG_SERVER \
            --resource-group $RESOURCE_GROUP \
            --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            echo "Creating PostgreSQL Flexible Server: $PG_SERVER"
            az postgres flexible-server create \
              --name $PG_SERVER \
              --resource-group $RESOURCE_GROUP \
              --location eastus \
              --admin-user $PG_ADMIN_USER \
              --admin-password "$PG_PASSWORD" \
              --sku-name Standard_B1ms \
              --tier Burstable \
              --version 16 \
              --public-access 0.0.0.0 \
              --yes 2>/dev/null || true
          fi
          # Ensure database exists
          az postgres flexible-server db create \
            --server-name $PG_SERVER \
            --resource-group $RESOURCE_GROUP \
            --database-name $PG_DB 2>/dev/null || true
          # Build connection string
          HOST=$(az postgres flexible-server show \
            --name $PG_SERVER \
            --resource-group $RESOURCE_GROUP \
            --query "fullyQualifiedDomainName" -o tsv 2>/dev/null || echo "")
          CS="postgresql://$PG_ADMIN_USER:${PG_PASSWORD}@${HOST}:5432/$PG_DB?sslmode=require"
          echo "::add-mask::$CS"
          echo "connection_string=$CS" >> $GITHUB_OUTPUT
          # Run migrations
          if [ -n "$HOST" ]; then
            PGPASSWORD="$PG_PASSWORD" psql \
              "host=$HOST port=5432 dbname=$PG_DB user=$PG_ADMIN_USER sslmode=require" \
              -f api/migrations/ux_design.sql || true
          fi

      - name: Sync AZURE_PG_UXDESIGN_CONNECTION_STRING to Function App
        if: steps.pgdb.outputs.connection_string != ''
        run: |
          az functionapp config appsettings set \
            --name $FUNCTION_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --settings "AZURE_PG_UXDESIGN_CONNECTION_STRING=${{ steps.pgdb.outputs.connection_string }}" \
            --output none

      - name: Build v2
        working-directory: v2
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_REDIRECT_URI: https://${{ steps.swa.outputs.hostname }}
          VITE_MS_CLIENT_ID: ${{ steps.msid.outputs.client_id }}
          VITE_MS_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          VITE_MS_REDIRECT_URI: https://${{ steps.swa.outputs.hostname }}
          VITE_API_BASE: ${{ steps.api.outputs.base }}
        run: |
          npm ci
          npm run build

      - name: Get Static Web App v2 token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy v2 to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: v2/dist
          output_location: ""
          skip_app_build: true

      - name: Register redirect URI on Azure AD app
        if: steps.msid.outputs.client_id != ''
        run: |
          APP_ID="${{ steps.msid.outputs.client_id }}"
          NEW_URI="https://${{ steps.swa.outputs.hostname }}"
          echo "Registering redirect URI: $NEW_URI on app $APP_ID"

          # Get object ID (Graph API needs object ID, not appId/clientId)
          OBJ_ID=$(az ad app show --id "$APP_ID" --query "id" -o tsv 2>/dev/null || echo "")
          if [ -z "$OBJ_ID" ]; then
            echo "Could not resolve object ID for app $APP_ID — skipping"
            exit 0
          fi

          # Get current SPA redirect URIs via Graph API
          CURRENT=$(az rest --method GET \
            --uri "https://graph.microsoft.com/v1.0/applications/$OBJ_ID" \
            --query "spa.redirectUris" -o json 2>/dev/null || echo "[]")

          # Check if already present
          if echo "$CURRENT" | grep -qF "$NEW_URI"; then
            echo "SPA redirect URI already registered — skipping"
          else
            # Merge and PATCH as SPA platform (required for PKCE auth code flow)
            BODY=$(echo "$CURRENT" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                const uris=JSON.parse(d);
                uris.push('$NEW_URI');
                console.log(JSON.stringify({spa:{redirectUris:uris}}));
              });
            ")
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications/$OBJ_ID" \
              --headers "Content-Type=application/json" \
              --body "$BODY"
            echo "SPA redirect URI registered"
          fi

      - name: Print app URL
        run: echo "v2 deployed to https://${{ steps.swa.outputs.hostname }}"
