name: Provision Entra App

on:
  workflow_dispatch:

env:
  SWA_NAME: design-library-builder
  RESOURCE_GROUP: EnterpriseDS_ResourceGRP
  MS_APP_NAME: design-library-builder

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Get SWA hostname
        id: swa
        run: |
          HOST=$(az staticwebapp show \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "defaultHostname" -o tsv 2>/dev/null || echo "")
          echo "hostname=$HOST" >> $GITHUB_OUTPUT
          echo "SWA hostname: $HOST"

      - name: Get Graph access token
        id: graph
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://graph.microsoft.com \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Create or update Entra app
        id: entra
        env:
          GRAPH_TOKEN: ${{ steps.graph.outputs.token }}
          REDIRECT_URI: https://${{ steps.swa.outputs.hostname }}
        run: |
          # Look up existing app by display name
          EXISTING=$(curl -s -X GET \
            "https://graph.microsoft.com/v1.0/applications?\$filter=displayName eq '$MS_APP_NAME'" \
            -H "Authorization: Bearer $GRAPH_TOKEN" \
            -H "Content-Type: application/json")

          APP_ID=$(echo "$EXISTING" | python3 -c "import sys,json; apps=json.load(sys.stdin).get('value',[]); print(apps[0]['id'] if apps else '')" 2>/dev/null || echo "")
          CLIENT_ID=$(echo "$EXISTING" | python3 -c "import sys,json; apps=json.load(sys.stdin).get('value',[]); print(apps[0]['appId'] if apps else '')" 2>/dev/null || echo "")

          if [ -z "$APP_ID" ]; then
            echo "Creating new Entra app: $MS_APP_NAME"
            RESULT=$(curl -s -X POST \
              "https://graph.microsoft.com/v1.0/applications" \
              -H "Authorization: Bearer $GRAPH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"displayName\":\"$MS_APP_NAME\",\"signInAudience\":\"AzureADMyOrg\",\"spa\":{\"redirectUris\":[\"$REDIRECT_URI\"]}}")
            APP_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))")
            CLIENT_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('appId',''))")
            echo "Created. appId=$CLIENT_ID"
          else
            echo "Found existing app. Updating SPA redirect URI to $REDIRECT_URI"
            curl -s -X PATCH \
              "https://graph.microsoft.com/v1.0/applications/$APP_ID" \
              -H "Authorization: Bearer $GRAPH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"spa\":{\"redirectUris\":[\"$REDIRECT_URI\"]}}"
            echo "Updated. appId=$CLIENT_ID"
          fi

          if [ -z "$CLIENT_ID" ]; then
            echo "ERROR: failed to create/update Entra app"
            exit 1
          fi

          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT

      - name: Print result
        run: |
          echo "✓ Entra app provisioned"
          echo "  Display name : $MS_APP_NAME"
          echo "  Client ID    : ${{ steps.entra.outputs.client_id }}"
          echo "  Redirect URI : https://${{ steps.swa.outputs.hostname }}"
          echo ""
          echo "Next: run 'Deploy App to Azure Static Web Apps' so the build picks up the new VITE_MS_CLIENT_ID."
