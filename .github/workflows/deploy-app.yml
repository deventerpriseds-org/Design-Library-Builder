name: Deploy App to Azure Static Web Apps

on:
  push:
    branches: [main, claude/figma-design-library-generator-esrbk9]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

env:
  SWA_NAME: design-library-builder
  RESOURCE_GROUP: EnterpriseDS_ResourceGRP
  FUNCTION_APP_NAME: design-library-builder-api

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Resolve Microsoft client ID
        id: msid
        run: |
          MSID=$(az ad app list --display-name design-library-builder --query "[0].appId" -o tsv 2>/dev/null || true)
          if [ -z "$MSID" ] || [ "$MSID" = "null" ]; then
            MSID=$(az ad app list --display-name executive-engine-web --query "[0].appId" -o tsv 2>/dev/null || true)
          fi
          if [ "$MSID" = "null" ]; then MSID=""; fi
          echo "client_id=${MSID}" >> $GITHUB_OUTPUT

      - name: Ensure Static Web App exists
        id: swa
        run: |
          EXISTS=$(az staticwebapp show \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            echo "Creating Static Web App: $SWA_NAME"
            az staticwebapp create \
              --name $SWA_NAME \
              --resource-group $RESOURCE_GROUP \
              --location eastus2 \
              --sku Free
          fi
          HOST=$(az staticwebapp show \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "defaultHostname" -o tsv 2>/dev/null || echo "")
          echo "hostname=$HOST" >> $GITHUB_OUTPUT

      - name: Resolve API URL
        id: api
        run: |
          HOST=$(az functionapp show \
            --name $FUNCTION_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "defaultHostName" -o tsv 2>/dev/null || echo "")
          if [ -n "$HOST" ]; then
            echo "base=https://$HOST/api" >> $GITHUB_OUTPUT
          else
            echo "base=https://design-library-builder-api.azurewebsites.net/api" >> $GITHUB_OUTPUT
          fi

      - name: Build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_REDIRECT_URI: https://proud-hill-09accd00f.7.azurestaticapps.net
          VITE_MS_CLIENT_ID: ${{ steps.msid.outputs.client_id }}
          VITE_MS_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          VITE_API_BASE: ${{ steps.api.outputs.base }}
        run: |
          npm ci
          npm run build

      - name: Get Static Web App token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true

      - name: Print app URL
        run: echo "App deployed to https://${{ steps.swa.outputs.hostname }}"
