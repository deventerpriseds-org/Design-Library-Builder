name: UAT - Playwright UI verification

on:
  workflow_dispatch:
    inputs:
      library_name:
        description: 'Library name to extract'
        required: false
        default: 'MedSync Design System'

jobs:
  uat_ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Generate MedSync-representative test image
        run: |
          # MedSync palette: near-black nav #1C1C1C, cream bg #F5F0E8, white cards, amber #F5A623
          python3 << 'PYEOF'
          import struct, zlib, array

          def chunk(name, data):
              crc = zlib.crc32(name + data) & 0xffffffff
              return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)

          w, h = 400, 300  # smaller = faster, still enough detail for color extraction
          NAV   = (28,  28,  28)
          CREAM = (245, 240, 232)
          WHITE = (255, 255, 255)
          AMBER = (245, 166, 35)

          buf = bytearray()
          for y in range(h):
              buf.append(0)  # PNG filter byte
              for x in range(w):
                  if y < 28:
                      px = NAV
                  elif x < 110 and y >= 28:
                      px = CREAM
                  elif 120 < x < 260 and 38 < y < 98:
                      px = WHITE
                  elif 120 < x < 250 and 40 < y < 45:
                      px = AMBER
                  elif 120 < x < 260 and 108 < y < 168:
                      px = WHITE
                  elif 270 < x < 390 and 38 < y < 168:
                      px = WHITE
                  elif 120 < x < 190 and 178 < y < 218:
                      px = AMBER
                  else:
                      px = CREAM
                  buf.extend(px)

          raw = bytes(buf)
          img_data = zlib.compress(raw)
          ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
          png  = b'\x89PNG\r\n\x1a\n'
          png += chunk(b'IHDR', ihdr)
          png += chunk(b'IDAT', img_data)
          png += chunk(b'IEND', b'')
          with open('/tmp/medsync-uat.png', 'wb') as f:
              f.write(png)
          print('OK - amber #F5A623, cream #F5F0E8, nav #1C1C1C, size', len(png), 'bytes')
          PYEOF

      - name: Upload test image to blob
        id: upload
        run: |
          UPLOAD_RESP=$(curl -s -X POST \
            "https://design-library-builder-api.azurewebsites.net/api/design-library/upload" \
            -F "file=@/tmp/medsync-uat.png;type=image/png")
          echo "Upload: $UPLOAD_RESP"
          IMAGE_URL=$(echo "$UPLOAD_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['url'])")
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT

      - name: Run Playwright UAT
        env:
          APP_URL: https://brave-coast-0274be70f.7.azurestaticapps.net
          UAT_BYPASS_TOKEN: ${{ secrets.UAT_BYPASS_TOKEN }}
          IMAGE_URL: ${{ steps.upload.outputs.image_url }}
          LIBRARY_NAME: ${{ github.event.inputs.library_name }}
        run: |
          npm install playwright
          cat > uat.cjs << 'PLAYWRIGHT_SCRIPT'
          const { chromium } = require('playwright')
          const APP_URL = process.env.APP_URL
          const UAT_TOKEN = process.env.UAT_BYPASS_TOKEN
          const IMAGE_URL = process.env.IMAGE_URL
          const LIBRARY_NAME = process.env.LIBRARY_NAME || 'MedSync Design System'

          if (!UAT_TOKEN) { console.error('UAT_BYPASS_TOKEN missing'); process.exit(1) }

          const results = []
          function report(tc, result, evidence) {
            const icon = result === 'PASS' ? '✅' : result === 'FAIL' ? '❌' : '⚠️ UNVERIFIED'
            console.log(`${icon} ${tc}: ${result}`)
            if (evidence) console.log(`   Evidence: ${evidence}`)
            results.push({ tc, result, evidence })
          }

          ;(async () => {
            const browser = await chromium.launch({ headless: true })
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } })
            const page = await context.newPage()
            const consoleErrors = []
            page.on('console', msg => { if (msg.type() === 'error') consoleErrors.push(msg.text()) })

            // TC-1: Auth bypass
            console.log('── TC-1: Auth bypass ──')
            await page.goto(APP_URL, { waitUntil: 'domcontentloaded' })
            await page.evaluate((token) => {
              localStorage.setItem('dlg_auth_user', JSON.stringify({
                id: 'von.ellis@enterpriseds.io',
                email: 'von.ellis@enterpriseds.io',
                name: 'Von Ellis'
              }))
              localStorage.setItem('dlg_uat_bypass_token', token)
            }, UAT_TOKEN)
            await page.reload({ waitUntil: 'networkidle' })
            const bodyText = await page.textContent('body')
            if (bodyText.includes('Sign in') || bodyText.includes('Login')) {
              report('TC-1 Auth bypass', 'FAIL', 'Still on login page after localStorage injection')
              await browser.close(); process.exit(1)
            }
            report('TC-1 Auth bypass', 'PASS', 'App loaded — no login redirect')

            // TC-2: App home loads
            console.log('── TC-2: App home ──')
            const homeHasContent = bodyText.includes('Upload') || bodyText.includes('Libraries') || bodyText.includes('Library')
            report('TC-2 App home loads', homeHasContent ? 'PASS' : 'FAIL', `Body snippet: ${bodyText.slice(0, 150)}`)

            // TC-3: Navigate to upload
            console.log('── TC-3: Upload page ──')
            await page.goto(APP_URL + '/#/upload', { waitUntil: 'networkidle' }).catch(() => {})
            await page.evaluate((token) => {
              localStorage.setItem('dlg_auth_user', JSON.stringify({ id: 'von.ellis@enterpriseds.io', email: 'von.ellis@enterpriseds.io', name: 'Von Ellis' }))
              localStorage.setItem('dlg_uat_bypass_token', token)
            }, UAT_TOKEN)
            await page.waitForTimeout(500)
            const uploadText = await page.textContent('body')
            const onUpload = uploadText.includes('Upload') || uploadText.includes('Figma') || uploadText.includes('screenshot')
            report('TC-3 Upload page loads', onUpload ? 'PASS' : 'FAIL', `URL: ${page.url()}, has upload content: ${onUpload}`)

            // TC-4: File input present
            console.log('── TC-4: File input ──')
            const fileInput = page.locator('input[type="file"]').first()
            const inputVisible = await fileInput.count() > 0
            report('TC-4 File input present', inputVisible ? 'PASS' : 'FAIL', `input[type=file] count: ${await fileInput.count()}`)

            if (inputVisible) {
              await fileInput.setInputFiles('/tmp/medsync-uat.png')
              await page.waitForTimeout(1000)
              report('TC-4b File selected', 'PASS', 'setInputFiles succeeded')
            }

            // TC-5: Extract button
            console.log('── TC-5: Extract ──')
            const extractBtn = page.locator('button').filter({ hasText: /extract|build|analyz|generat|submit/i }).first()
            const hasBtn = await extractBtn.count() > 0
            if (!hasBtn) {
              report('TC-5 Extract button', 'FAIL', 'No extract/build button found')
            } else {
              const btnLabel = await extractBtn.textContent()
              await extractBtn.click()
              report('TC-5 Extract button clicked', 'PASS', `Clicked: "${btnLabel.trim()}"`)

              // TC-6: Wait for extraction to complete (Review screen appears)
              console.log('── TC-6: Wait for extraction ──')
              try {
                await page.waitForFunction(() => {
                  const body = document.body.textContent
                  return body.includes('Extraction Complete') || body.includes('Review') && body.includes('Export')
                }, { timeout: 90000 })
                const reviewText = await page.textContent('body')
                report('TC-6 Extraction completes', 'PASS', `Review screen: ${reviewText.slice(0, 150)}`)
              } catch {
                const nowText = await page.textContent('body')
                report('TC-6 Extraction completes', 'FAIL', `Timed out. Body: ${nowText.slice(0, 300)}`)
                await browser.close()
                printSummary()
                process.exit(1)
              }

              // Navigate to Showcase for TC-7/8/9
              const showcaseBtn = page.locator('button, a').filter({ hasText: /showcase|preview/i }).first()
              if (await showcaseBtn.count() > 0) {
                await showcaseBtn.click()
                await page.waitForTimeout(2000)
              } else {
                await page.goto(APP_URL + '/#/showcase', { waitUntil: 'networkidle' }).catch(() => {})
                await page.waitForTimeout(1000)
              }
            }

            // TC-7: Component descriptions
            console.log('── TC-7: Descriptions ──')
            const showcaseText = await page.textContent('body')
            const descPhrases = ['action trigger', 'entry field', 'selection control', 'status', 'identity', 'grouping', 'feedback', 'data grid', 'overlay', 'navigation']
            const found = descPhrases.filter(d => showcaseText.toLowerCase().includes(d))
            report('TC-7 Component descriptions', found.length >= 4 ? 'PASS' : 'FAIL', `${found.length}/10 phrases: ${found.join(', ')}`)

            // TC-8: Color is not indigo fallback
            console.log('── TC-8: Color extraction ──')
            const colors = await page.evaluate(() => {
              const els = document.querySelectorAll('[style]')
              const found = new Set()
              for (const el of els) {
                const s = el.getAttribute('style') || ''
                const m = s.match(/#([0-9a-fA-F]{6})/g)
                if (m) m.forEach(c => found.add(c.toLowerCase()))
              }
              return [...found]
            })
            // Indigo baseline: #6366f1, #818cf8
            const isIndigo = colors.some(c => c === '#6366f1' || c === '#818cf8' || c === '#4f46e5')
            // Amber: r>200, g>100, b<100
            const hasAmber = colors.some(c => {
              const r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16)
              return r>200 && g>100 && b<100
            })
            if (hasAmber) {
              report('TC-8 Color extraction (amber)', 'PASS', `Amber color found. All: ${colors.slice(0,8).join(', ')}`)
            } else if (isIndigo) {
              report('TC-8 Color extraction (not indigo)', 'FAIL', `Indigo fallback present: ${colors.filter(c=>c==='#6366f1'||c==='#818cf8').join(', ')}. All: ${colors.slice(0,8).join(', ')}`)
            } else {
              report('TC-8 Color extraction', 'UNVERIFIED', `Colors in DOM: ${colors.slice(0,8).join(', ')}`)
            }

            // TC-9: Storybook link points to root
            console.log('── TC-9: Storybook link ──')
            const sbLinks = await page.locator('a').evaluateAll(els =>
              els.filter(a => a.textContent.includes('Storybook') || (a.href||'').includes('storybook'))
                 .map(a => a.href)
            )
            if (sbLinks.length === 0) {
              report('TC-9 Storybook link', 'UNVERIFIED', 'No Storybook link visible on current page')
            } else {
              const badLinks = sbLinks.filter(h => h.includes('path=/story/design-system') || h.includes('path=/story/design-library'))
              if (badLinks.length > 0) {
                report('TC-9 Storybook link', 'FAIL', `Invalid story path in href: ${badLinks[0]}`)
              } else {
                report('TC-9 Storybook link', 'PASS', `href: ${sbLinks[0]} — no invalid story slug`)
              }
            }

            // TC-10: Libraries tab
            console.log('── TC-10: Libraries tab ──')
            await page.goto(APP_URL + '/#/libraries', { waitUntil: 'networkidle' }).catch(() => {})
            await page.evaluate((token) => {
              localStorage.setItem('dlg_auth_user', JSON.stringify({ id: 'von.ellis@enterpriseds.io', email: 'von.ellis@enterpriseds.io', name: 'Von Ellis' }))
              localStorage.setItem('dlg_uat_bypass_token', token)
            }, UAT_TOKEN)
            await page.waitForTimeout(2000)
            const libText = await page.textContent('body')
            if (libText.includes('No libraries') || libText.includes('no libraries')) {
              report('TC-10 Libraries tab', 'FAIL', 'Empty state — no libraries saved')
            } else if (libText.includes('Design System') || libText.includes('MedSync') || libText.includes('library')) {
              const count = (libText.match(/Design System|MedSync/g) || []).length
              report('TC-10 Libraries tab', 'PASS', `Library count visible: ${count} match(es)`)
            } else {
              report('TC-10 Libraries tab', 'UNVERIFIED', `Body: ${libText.slice(0,200)}`)
            }

            // TC-11: Console errors
            console.log('── TC-11: Console errors ──')
            if (consoleErrors.length > 0) {
              report('TC-11 No console errors', 'FAIL', `${consoleErrors.length} errors: ${consoleErrors.slice(0,3).join(' | ')}`)
            } else {
              report('TC-11 No console errors', 'PASS', '0 errors')
            }

            await browser.close()
            printSummary()
            const failCount = results.filter(r => r.result === 'FAIL').length
            if (failCount > 0) process.exit(1)
          })()

          function printSummary() {
            console.log('\n══════════════════════════════════════')
            console.log('VERIFICATION REPORT — Design Library Builder UI')
            console.log('══════════════════════════════════════')
            const pass = results.filter(r => r.result === 'PASS').length
            const fail = results.filter(r => r.result === 'FAIL').length
            const unv  = results.filter(r => r.result === 'UNVERIFIED').length
            results.forEach(r => {
              const icon = r.result === 'PASS' ? '✅' : r.result === 'FAIL' ? '❌' : '⚠️'
              console.log(`${icon} ${r.tc}: ${r.result}`)
              if (r.evidence) console.log(`   ${r.evidence}`)
            })
            console.log(`\nVERDICT: PASS ${pass}/${results.length} | FAIL ${fail} | UNVERIFIED ${unv}`)
          }
          PLAYWRIGHT_SCRIPT

          node uat.cjs
