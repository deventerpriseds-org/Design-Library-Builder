name: Storybook Build + Supernova Sync

on:
  # Polls Azure Table Storage for queued Figma LIBRARY_PUBLISH events (every 5 min)
  schedule:
    - cron: '*/5 * * * *'

  # Triggered when story files are committed by the extraction push lane
  push:
    branches: [main, claude/figma-builder-app-copy-xeidub]
    paths:
      - 'storybook/stories/**'

  # Manual trigger
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if no pending Figma events'
        required: false
        default: 'false'

env:
  STORYBOOK_SWA_NAME: design-library-builder-storybook
  RESOURCE_GROUP: EnterpriseDS_ResourceGRP
  FUNCTION_APP_NAME: design-library-builder-api

jobs:
  check_and_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Check for pending Figma events
        id: check_events
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          # Skip check on push or forced manual run
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "has_events=true" >> $GITHUB_OUTPUT
            echo "trigger=push" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Install Azure Storage SDK for the Node script below
          npm install @azure/data-tables --prefix /tmp/az-tables --silent 2>/dev/null || true
          export NODE_PATH=/tmp/az-tables/node_modules

          # Query FigmaEvents table for unprocessed events
          PENDING=$(node -e "
            const { TableClient } = require('@azure/data-tables');
            async function main() {
              try {
                const client = TableClient.fromConnectionString(
                  process.env.AZURE_STORAGE_CONNECTION_STRING, 'FigmaEvents'
                );
                const entities = client.listEntities({
                  queryOptions: { filter: \"processed eq false\" }
                });
                let count = 0;
                for await (const e of entities) { count++; if (count >= 1) break; }
                console.log(count > 0 ? 'true' : 'false');
              } catch { console.log('false'); }
            }
            main();
          " 2>/dev/null || echo 'false')

          echo "has_events=$PENDING" >> $GITHUB_OUTPUT
          echo "trigger=schedule" >> $GITHUB_OUTPUT
          echo "Pending Figma events: $PENDING"

      - name: Skip if no pending events
        if: steps.check_events.outputs.has_events != 'true'
        run: |
          echo "No pending Figma events — skipping sync"
          exit 0

      - name: Ensure upload blob container exists
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          az storage container create \
            --name design-library-uploads \
            --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
            --public-access off 2>/dev/null || true
          echo "Container design-library-uploads ready"

      - name: Ensure Storybook Static Web App exists
        id: swa
        run: |
          EXISTS=$(az staticwebapp show \
            --name $STORYBOOK_SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            echo "Creating Storybook SWA: $STORYBOOK_SWA_NAME"
            az staticwebapp create \
              --name $STORYBOOK_SWA_NAME \
              --resource-group $RESOURCE_GROUP \
              --location eastus2 \
              --sku Free
          fi
          HOST=$(az staticwebapp show \
            --name $STORYBOOK_SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "defaultHostname" -o tsv 2>/dev/null || echo "")
          echo "hostname=$HOST" >> $GITHUB_OUTPUT
          echo "Storybook SWA: $HOST"

      - name: Build Storybook
        if: hashFiles('storybook/package.json') != ''
        working-directory: storybook
        env:
          NODE_OPTIONS: --max_old_space_size=4096
        run: |
          npm ci
          npm run build-storybook

      - name: Get Storybook SWA token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name $STORYBOOK_SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy Storybook
        if: hashFiles('storybook/package.json') != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: storybook/storybook-static
          output_location: ''
          skip_app_build: true

      - name: Install Supernova CLI
        run: npm install -g @supernovaio/cli@2.2.5

      - name: Resolve Supernova design system ID
        id: supernova_ws
        env:
          SUPERNOVA_TOKEN: ${{ secrets.SUPERNOVA_AUTH_TOKEN }}
        run: |
          # Use CLI to list workspaces and extract first design system ID
          DESCRIBE=$(supernova describe-workspaces --apiKey "$SUPERNOVA_TOKEN" 2>&1 || echo "")
          echo "$DESCRIBE"

          DS_ID=$(echo "$DESCRIBE" | grep -oP '(?<="id"\s*:\s*")[^"]+' | head -1 || echo "")
          echo "design_system_id=$DS_ID" >> $GITHUB_OUTPUT
          echo "Supernova design system ID: $DS_ID"

      - name: Import Storybook to Supernova
        if: steps.supernova_ws.outputs.design_system_id != ''
        env:
          SUPERNOVA_TOKEN: ${{ secrets.SUPERNOVA_AUTH_TOKEN }}
        run: |
          DS_ID="${{ steps.supernova_ws.outputs.design_system_id }}"
          echo "Importing Storybook static export to Supernova design system $DS_ID"

          supernova storybook-import \
            --apiKey "$SUPERNOVA_TOKEN" \
            --designSystemId "$DS_ID" \
            --from storybook/storybook-static \
            --name "main"

      - name: Sync Figma tokens to Supernova
        if: steps.check_events.outputs.trigger == 'schedule' && steps.supernova_ws.outputs.design_system_id != ''
        env:
          SUPERNOVA_TOKEN: ${{ secrets.SUPERNOVA_AUTH_TOKEN }}
          FIGMA_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          export NODE_PATH=/tmp/az-tables/node_modules
          # Get the most recent file key from the queued event
          FILE_KEY=$(node -e "
            const { TableClient } = require('@azure/data-tables');
            async function main() {
              try {
                const client = TableClient.fromConnectionString(
                  process.env.AZURE_STORAGE_CONNECTION_STRING, 'FigmaEvents'
                );
                const entities = client.listEntities({
                  queryOptions: { filter: \"processed eq false\" }
                });
                for await (const e of entities) { console.log(e.fileKey||''); break; }
              } catch { console.log(''); }
            }
            main();
          " 2>/dev/null || echo "")

          if [ -n "$FILE_KEY" ] && [ -n "$FIGMA_TOKEN" ]; then
            supernova sync-tokens \
              --token "$SUPERNOVA_TOKEN" \
              --workspace "${{ steps.supernova_ws.outputs.workspace_id }}" \
              --figma-token "$FIGMA_TOKEN" \
              --figma-file-id "$FILE_KEY" \
            || echo "Note: token sync CLI command may differ — check Supernova docs"
          fi

      - name: Mark Figma events as processed
        if: steps.check_events.outputs.trigger == 'schedule'
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          export NODE_PATH=/tmp/az-tables/node_modules
          node -e "
            const { TableClient } = require('@azure/data-tables');
            async function main() {
              try {
                const client = TableClient.fromConnectionString(
                  process.env.AZURE_STORAGE_CONNECTION_STRING, 'FigmaEvents'
                );
                const entities = client.listEntities({
                  queryOptions: { filter: \"processed eq false\" }
                });
                for await (const e of entities) {
                  await client.updateEntity({ ...e, processed: true }, 'Merge');
                }
                console.log('Events marked processed');
              } catch(err) { console.error('Mark processed failed:', err.message); }
            }
            main();
          " 2>/dev/null || true

      - name: Register Figma webhook (first run / idempotent)
        if: github.event_name == 'workflow_dispatch'
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          # Reuses AZURE_CLIENT_SECRET as the Figma passcode — same value
          # synced to Function App as FIGMA_WEBHOOK_PASSCODE
          FIGMA_PASSCODE: ${{ secrets.AZURE_CLIENT_SECRET }}
          FUNCTION_HOST: design-library-builder-api.azurewebsites.net
        run: |
          ENDPOINT="https://$FUNCTION_HOST/api/figma-webhook"
          echo "Registering Figma LIBRARY_PUBLISH webhook → $ENDPOINT"

          # List existing webhooks to avoid duplicates
          EXISTING=$(curl -s \
            -H "X-Figma-Token: $FIGMA_TOKEN" \
            "https://api.figma.com/v2/webhooks" \
            | node -e "
              let d='';
              process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try {
                  const r=JSON.parse(d);
                  const match=(r.webhooks||[]).find(w=>w.endpoint==='$ENDPOINT');
                  console.log(match?.id||'');
                } catch { console.log(''); }
              });
            " 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Webhook already registered (id: $EXISTING) — skipping"
            exit 0
          fi

          # Register new webhook — requires Figma team ID from the file
          # Uses PING first to confirm endpoint, then LIBRARY_PUBLISH
          RESULT=$(curl -s -X POST \
            -H "X-Figma-Token: $FIGMA_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.figma.com/v2/webhooks" \
            -d "{
              \"event_type\": \"LIBRARY_PUBLISH\",
              \"team_id\": \"$(az functionapp config appsettings list \
                --name $FUNCTION_APP_NAME \
                --resource-group $RESOURCE_GROUP \
                --query \"[?name=='FIGMA_TEAM_ID'].value | [0]\" -o tsv 2>/dev/null || echo '')\",
              \"endpoint\": \"$ENDPOINT\",
              \"passcode\": \"$FIGMA_PASSCODE\",
              \"status\": \"ACTIVE\",
              \"description\": \"Design Library Builder — library publish sync\"
            }")

          echo "Webhook registration result: $RESULT"

      - name: Summary
        if: always()
        run: |
          echo "=== Sync Summary ==="
          echo "Trigger: ${{ steps.check_events.outputs.trigger || github.event_name }}"
          echo "Storybook URL: https://${{ steps.swa.outputs.hostname }}"
          echo "Supernova workspace: ${{ steps.supernova_ws.outputs.workspace_id }}"
          echo "Job status: ${{ job.status }}"
